version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: ecoquest-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ecoquest
    restart: unless-stopped
    networks:
      - ecoquest-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoquest-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/ecoquest
      JWT_SECRET: ${JWT_SECRET:-ecoquest_super_secret_key_2024}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - ecoquest-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecoquest-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ecoquest-net

volumes:
  mongo_data:
  uploads_data:

networks:
  ecoquest-net:
    driver: bridge
